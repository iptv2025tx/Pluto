name: Generate M3U Every 6 Hours

on:
  schedule:
    - cron: '0 */6 * * *'  # Runs every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:     # Manual trigger option

jobs:
  generate-m3u:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then
          pip install -r requirements.txt
        fi
        
    - name: Run pluto.py to generate M3U
      run: python pluto.py
      
    - name: Commit M3U changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "M3U Generator"
        git add *.m3u *.M3U *.m3u8
        git diff --staged --quiet || git commit -m "Update M3U playlists [$(date)]"
        
    - name: Push M3U files
      uses: ad-m/github-push-action@v0.6.0
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        branch: main
